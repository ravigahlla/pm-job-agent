# Runs the pm-job-agent pipeline on weekday mornings.
#
# Schedule: 11:00 UTC = 4am PT / 7am ET — off-peak for Anthropic API, in your
# inbox before your work day starts.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   AGENT_CONTEXT_MD            — contents of private/agent-context.md
#   SEARCH_PROFILE_YAML         — contents of private/search_profile.yaml
#   ANTHROPIC_API_KEY           — (or whichever LLM provider you use)
#   APIFY_API_TOKEN             — LinkedIn job scraping via Apify
#   GMAIL_SENDER                — Gmail address that sends the digest
#   GMAIL_APP_PASSWORD          — Gmail App Password (not your account password)
#   NOTIFY_EMAIL                — recipient address for the digest email
#
# Optional secrets (Google Sheets tracker):
#   GOOGLE_SHEETS_ID            — Sheet ID from the URL (enables cross-run job tracker)
#   GOOGLE_SERVICE_ACCOUNT_JSON — full contents of private/service_account.json
#
# Optional secrets (scoring):
#   SCORING_CRITERIA_MD         — contents of private/scoring_criteria.md (personalised rubric)
#
# Optional secrets (LLM provider switching):
#   OPENAI_API_KEY, GOOGLE_API_KEY — if you switch LLM providers

name: Daily job digest

on:
  schedule:
    # Weekdays at 11:00 UTC (4am PT / 7am ET)
    - cron: "0 11 * * 1-5"
  workflow_dispatch:  # Allow manual trigger from GitHub UI for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[anthropic]"

      # Restore seen_jobs.json from cache so deduplication works across runs.
      # If the cache is missing (first run or eviction), the file simply won't
      # exist and all jobs will appear as new — acceptable degraded behaviour.
      - name: Restore seen_jobs cache
        uses: actions/cache/restore@v4
        with:
          path: private/seen_jobs.json
          key: seen-jobs-v1

      # Write gitignored private files from repository secrets.
      # GOOGLE_SERVICE_ACCOUNT_JSON is optional — only written if the secret is set.
      - name: Write private config files
        env:
          AGENT_CONTEXT_MD: ${{ secrets.AGENT_CONTEXT_MD }}
          SEARCH_PROFILE_YAML: ${{ secrets.SEARCH_PROFILE_YAML }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SCORING_CRITERIA_MD: ${{ secrets.SCORING_CRITERIA_MD }}
        run: |
          mkdir -p private
          printf '%s' "$AGENT_CONTEXT_MD" > private/agent-context.md
          printf '%s' "$SEARCH_PROFILE_YAML" > private/search_profile.yaml
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > private/service_account.json
          fi
          if [ -n "$SCORING_CRITERIA_MD" ]; then
            printf '%s' "$SCORING_CRITERIA_MD" > private/scoring_criteria.md
          fi

      - name: Run pipeline
        env:
          DEFAULT_LLM_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          # NOTIFY_TOP_N and SEEN_JOBS_TTL_DAYS use defaults from settings.py (20 and 60).
          # Only add these as secrets if you need to override them.
        run: pm-job-agent run

      # Save seen_jobs.json only if the file exists (it won't on a failed first run).
      # Runs even when the pipeline step fails so partial progress is preserved.
      - name: Save seen_jobs cache
        if: always() && hashFiles('private/seen_jobs.json') != ''
        uses: actions/cache/save@v4
        with:
          path: private/seen_jobs.json
          key: seen-jobs-v1
